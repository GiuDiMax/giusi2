<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Priorità - Trasparenza Elettorale 2025</title>
    <!-- Google Fonts: Montserrat -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800;900&display=swap" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #f0fdf4; }
        /* Gradiente basato sui colori del nuovo logo: Verde */
        .logo-gradient { background: linear-gradient(135deg, #10b981 0%, #059669 100%); }
        .btn-hover { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .btn-hover:hover { transform: translateY(-2px) scale(1.02); }
        .subtitle-sindaco { font-size: 0.75em; font-weight: 700; }
    </style>
</head>
<body class="text-slate-800">

    <!-- Hero Section -->
    <header class="logo-gradient text-white py-12 px-4 shadow-lg border-b-4 border-green-800">
        <div class="max-w-5xl mx-auto flex flex-col items-center text-center">
            <!-- Il logo deve chiamarsi logo.webp per caricarsi correttamente -->
            <img src="logo.webp" alt="Logo La Priorità" class="w-44 h-44 rounded-full bg-white p-1 mb-6 shadow-2xl border-4 border-white">
            <h1 class="text-4xl md:text-6xl font-black tracking-tighter leading-none">
                La Priorità: Capurso<br>
                <span class="text-yellow-300 subtitle-sindaco italic">Giusi Pepe Sindaco</span>
            </h1>
            <p class="mt-4 text-sm font-bold opacity-80 tracking-[0.2em] uppercase">Elezioni Trasparenti 2025</p>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-4 -mt-8 pb-20">
        
        <!-- Candidato Sindaco Highlight -->
        <section class="bg-white rounded-3xl p-8 shadow-2xl mb-12 border-t-8 border-green-500">
            <div class="flex flex-col md:flex-row items-center justify-between gap-8">
                <div class="flex items-center gap-6">
                    <div class="relative">
                        <div class="absolute -inset-1 bg-gradient-to-tr from-yellow-300 to-green-600 rounded-full blur opacity-25"></div>
                        <img src="photo.webp" alt="Giusi Pepe" class="relative w-28 h-28 rounded-full object-cover border-4 border-white shadow-lg">
                    </div>
                    <div>
                        <span class="text-green-600 font-bold text-xs uppercase tracking-widest">Candidato Sindaco</span>
                        <h2 class="text-4xl font-extrabold text-slate-900">Giusi Pepe</h2>
                    </div>
                </div>
                <div class="flex flex-wrap gap-4">
                    <a href="/files/pepe_giusi_cv.pdf" 
                       title="Scarica curriculum vitae" 
                       class="btn-hover flex items-center gap-2 bg-green-600 text-white px-6 py-3 rounded-xl font-bold uppercase text-sm shadow-md">
                        <i data-lucide="file-text" class="w-5 h-5"></i> CV
                    </a>
                    <a href="/files/pepe_giusi_ccg.pdf" 
                       title="Scarica certificato del casellario giudiziale" 
                       class="btn-hover flex items-center gap-2 bg-slate-800 text-white px-6 py-3 rounded-xl font-bold uppercase text-sm shadow-md">
                        <i data-lucide="gavel" class="w-5 h-5"></i> CCG
                    </a>
                </div>
            </div>
        </section>

        <!-- Consiglieri Section -->
        <div class="mb-8 flex items-center justify-between px-2">
            <h3 class="text-2xl font-black uppercase text-slate-900 flex items-center gap-3">
                <i data-lucide="users" class="text-green-600"></i> Lista Consiglieri
            </h3>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <script>
                const candidati = [
                    "Aliano Emanuele Giuseppe",
                    "Cascarano Filomena",
                    "Crudele Annuzza Maria",
                    "Detommaso Nunzio",
                    "Gasparucci Marianna",
                    "Lapolla Lorenzo",
                    "Lovaglio Rosanna",
                    "Papapicco Cosimo",
                    "Rubino Michele",
                    "Rubino Vito",
                    "Tarantino Graziana",
                    "Zienna Claudio"
                ];

                const formatFileName = (name) => {
                    return name.split(" detto")[0].toLowerCase().replace(/ /g, '_');
                };

                const formatDisplayName = (name) => {
                    if (name.includes(" detto ")) {
                        const parts = name.split(" detto ");
                        return `${parts[0]} <span class="italic font-medium text-slate-500 text-sm">detto ${parts[1]}</span>`;
                    }
                    return name;
                };

                document.write(candidati.map((nome, index) => `
                    <div class="bg-white p-5 rounded-2xl flex items-center justify-between border border-slate-100 hover:border-green-300 transition-all shadow-sm group">
                        <div class="flex items-center gap-4">
                            <span class="text-green-200 font-black text-xl w-6 text-center">${index + 1}</span>
                            <h4 class="font-bold text-slate-700 group-hover:text-green-700 transition-colors leading-tight">
                                ${formatDisplayName(nome)}
                            </h4>
                        </div>
                        <div class="flex gap-2">
                            <a href="/files/${formatFileName(nome)}_cv.pdf" 
                               title="Scarica curriculum vitae" 
                               class="flex items-center gap-1.5 px-3 py-2 bg-slate-50 hover:bg-green-100 text-green-700 rounded-lg transition-all border border-slate-100 font-bold text-xs" download>
                                <i data-lucide="file-text" class="w-4 h-4"></i> CV
                            </a>
                            <a href="/files/${formatFileName(nome)}_ccg.pdf" 
                               title="Scarica certificato del casellario giudiziale" 
                               class="flex items-center gap-1.5 px-3 py-2 bg-slate-50 hover:bg-slate-200 text-slate-700 rounded-lg transition-all border border-slate-100 font-bold text-xs" download>
                                <i data-lucide="gavel" class="w-4 h-4"></i> CCG
                            </a>
                        </div>
                    </div>
                `).join(''));
            </script>
        </div>
    </main>

    <footer class="bg-slate-900 text-slate-400 py-12 text-center border-t-4 border-green-600">
        <div class="max-w-5xl mx-auto px-4">
            <p class="text-white font-bold text-lg mb-4">La Priorità - Giusi Pepe Sindaco</p>
            <div class="w-12 h-1 border-t-2 border-yellow-400 mx-auto mb-6"></div>
            <p class="text-xs opacity-50 tracking-widest uppercase">Documentazione pubblicata ai sensi della Legge 3/2019</p>
        </div>
    </footer>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
